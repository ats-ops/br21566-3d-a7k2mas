<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
骨格標本3Dビューア
</title>


<link rel="stylesheet" href="style.css">



<!-- model-viewer -->

<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
</script>


</head>



<body>


<header>

<h1>
骨格標本 3Dビューア
</h1>

<p>
3D Scan Specimen Viewer
</p>


</header>



<main>



<!-- =========================
     3D Viewer
========================= -->


<section class="viewer-area">


<model-viewer


id="viewer"


src="models/3593_bear.glb"



camera-controls


touch-action="pan-y"



ar


ar-modes="
webxr scene-viewer quick-look
"



shadow-intensity="1"



environment-image="neutral"



exposure="0.55"



tone-mapping="neutral"



auto-rotate



rotation-per-second="12deg"



camera-orbit="90deg 75deg 5m"



field-of-view="40deg"



interaction-prompt="auto"



loading="eager"


>


</model-viewer>


</section>





<!-- =========================
     操作パネル
========================= -->


<section class="control-area">



<!-- 標本切替 -->

<div class="model-select">


<h2>
標本選択
</h2>


<select id="model-select">


<option value="3593">

SINH-MA-835 ヒグマ頭骨

</option>



<option value="4127">

SINH-MA-770 ツキノワグマ頭骨

</option>


</select>


</div>





<!-- 部位一覧 -->


<div>


<h2>
部位一覧
</h2>


<div id="panel">


</div>


</div>





<!-- 説明 -->

<div id="info">


<h2>
操作方法
</h2>


<p>

部位を選択してください。

</p>


</div>



</section>



</main>






<!-- =========================
     標本情報
========================= -->


<section class="specimen-info">


<h2>
標本情報
</h2>



<table>


<tr>

<th>
標本名
</th>

<td id="specimen-name">
-
</td>

</tr>



<tr>

<th>
学名
</th>

<td id="species">
-
</td>

</tr>



<tr>

<th>
個体情報
</th>

<td id="age">
-
</td>

</tr>



<tr>

<th>
性別
</th>

<td id="sex">
-
</td>

</tr>



<tr>

<th>
取得場所
</th>

<td id="location">
-
</td>

</tr>



<tr>

<th>
取得日
</th>

<td id="date">
-
</td>

</tr>



<tr>

<th>
保存状態
</th>

<td id="condition">
-
</td>

</tr>



<tr>

<th>
標本番号
</th>

<td id="specimen-id">
-
</td>

</tr>



</table>


</section>







<footer>


<p>

© 3D Specimen Viewer

</p>


</footer>





<!-- JavaScript -->


<script type="module" src="js/viewer.js"></script>



</body>


</html>
